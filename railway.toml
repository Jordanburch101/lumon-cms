[build]
builder = "nixpacks"
buildCommand = "bun install --frozen-lockfile && bun run generate:types && bun run generate:importmap && bun run generate:field-map && bun run build"

[deploy]
startCommand = "bun run start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
